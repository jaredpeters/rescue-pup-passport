name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build (static export)
        run: npm run build
        env:
          # Build must succeed even without real Supabase credentials. The app
          # shows a setup screen at runtime when env vars are missing or contain
          # placeholder values, so no real connection is needed at build time.
          NEXT_PUBLIC_SUPABASE_URL: https://your-project-id.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: your-anon-public-key-here
